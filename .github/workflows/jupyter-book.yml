name: Build and Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.guard.outputs.skip }}
      pages_enabled: ${{ steps.pages_check.outputs.pages_enabled }}
    steps:
      - uses: actions/checkout@v5

      - name: Skip if template has not been initialised
        id: guard
        run: |
          # {{ZENODO_DOI}} is documented to remain unsubstituted until the first
          # GitHub release mints the concept DOI — so don't treat it as a blocker.
          # See docs/fair4rs-checklist.md.
          placeholder_files=$(grep -rln '{{[A-Z_]\+}}' . --include='*.md' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.cff' --include='*.py' --include='*.toml' 2>/dev/null \
            | grep -v 'claude/skills/init-template/' \
            | while read f; do
                if grep -oE '\{\{[A-Z_]+\}\}' "$f" | grep -qv '{{ZENODO_DOI}}'; then
                  echo "$f"
                fi
              done)
          if [ -n "$placeholder_files" ]; then
            echo "::notice::Template placeholders detected ({{...}} tokens). Run /init-template inside Claude Code (or substitute manually) before the Jupyter Book builds meaningfully. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether GitHub Pages is enabled
        id: pages_check
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "::notice::GitHub Pages is enabled — Jupyter Book will deploy."
            echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GitHub Pages is not yet enabled on this repo. Build will run; deploy will be skipped. Enable Pages at https://github.com/${{ github.repository }}/settings/pages (Source: GitHub Actions) to enable deploy on the next push."
            echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pixi
        if: steps.guard.outputs.skip != 'true'
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.68.1
          locked: true
          cache: true
          environments: docs

      # Copernicus Marine credentials for notebook 01's GLORYS download. The
      # maintainer MUST set the repo secret COPERNICUS_CREDENTIALS_BASE64
      # (base64-encoded INI: [credentials]\nusername=...\npassword=...).
      - name: Set up Copernicus Marine credentials
        if: steps.guard.outputs.skip != 'true' && env.COPERNICUS_CREDENTIALS_BASE64 != ''
        env:
          COPERNICUS_CREDENTIALS_BASE64: ${{ secrets.COPERNICUS_CREDENTIALS_BASE64 }}
        run: |
          mkdir -p ~/.copernicusmarine
          echo "$COPERNICUS_CREDENTIALS_BASE64" | base64 -d \
            > ~/.copernicusmarine/.copernicusmarine-credentials

      # Render the notebooks as code pages WITHOUT executing them: the analysis
      # downloads ~2.5 GB of GLORYS and runs a multi-hour HMM per tag, which is not
      # viable on a free runner. The headline figures are committed to the repo and
      # embedded in index.md, so the book is meaningful without re-execution. To
      # regenerate everything, run `pixi run snakemake --cores 1` on dedicated compute.
      - name: Convert .py notebooks to .ipynb (not executed)
        if: steps.guard.outputs.skip != 'true'
        run: |
          for nb in notebooks/*.py; do
            pixi run jupytext --to notebook "$nb"
          done

      - name: Build MyST site
        if: steps.guard.outputs.skip != 'true'
        env:
          # MyST silently ignores `base_url` in myst.yml — only this env var
          # works. See docs/cicd-conventions.md.
          BASE_URL: /${{ github.event.repository.name }}
        run: pixi run -e docs myst build --html

      - name: Upload pages artifact
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _build/html

  deploy:
    needs: build
    if: needs.build.outputs.skip != 'true' && needs.build.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
